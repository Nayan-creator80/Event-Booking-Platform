version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: capstone
      POSTGRES_PASSWORD: capstone
      POSTGRES_DB: capstone_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: sh -c "npx prisma db push && npx prisma db seed && node dist/server.js"
    environment:
      DATABASE_URL: postgresql://capstone:capstone@db:5432/capstone_db?schema=public
      PORT: 4000
      NODE_ENV: production
      JWT_SECRET: capstone-secret-key-12345
      JWT_REFRESH_SECRET: capstone-refresh-key-12345
      CLIENT_ORIGIN: http://localhost:3000
    depends_on:
      - db
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api/v1
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data:
